services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: referx
      POSTGRES_PASSWORD: password
      POSTGRES_DB: referx
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U referx -d referx"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql://referx:password@db:5432/referx?schema=public
      CLIENT_URL: http://localhost:3000
      API_URL: http://localhost:5000
    env_file:
      - ./docker/compose.env
      - path: ./backend/.env
        required: false
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/client/Dockerfile
      args:
        BACKEND_URL: http://backend:5000
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads: